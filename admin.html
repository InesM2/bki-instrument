<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion admin - BKI Instrument</title>

<style>
body {
background: #1c1a19;
color: #f5f5f5;
font-family: Arial;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
.box {
background: #2b2725;
padding: 30px;
border-radius: 10px;
width: 350px;
}
input {
width: 100%;
padding: 10px;
margin-top: 10px;
margin-bottom: 15px;
border-radius: 5px;
border: none;
}
button {
padding: 10px 15px;
background: #8b5e3c;
border: none;
color: white;
border-radius: 5px;
cursor: pointer;
}
.success {
background: #2e7d32;
padding: 10px;
margin-top: 15px;
display: none;
}
.error {
background: #c62828;
padding: 10px;
margin-top: 15px;
display: none;
}
</style>
</head>

<body>

<div class="box">
<h2>Connexion admin</h2>

<input type="text" id="login" placeholder="Identifiant admin">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="loginAdmin()">Se connecter</button>

<div class="success" id="success">Connexion réussie</div>
<div class="error" id="error">Identifiant ou mot de passe incorrect</div>
</div>

<script>
function loginAdmin() {

var login = document.getElementById("login").value;
var password = document.getElementById("password").value;

var admins = [
{user: "admin1", pass: "bki2026"},
{user: "admin2", pass: "music2026"},
{user: "admin3", pass: "instrument2026"}
];

var success = document.getElementById("success");
var error = document.getElementById("error");

success.style.display = "none";
error.style.display = "none";

for (var i = 0; i < admins.length; i++) {
if (login === admins[i].user && password === admins[i].pass) {

success.style.display = "block";

setTimeout(function() {
window.location.href = "http://10.0.0.10/bki_web/index.php";
}, 1000);

return;
}
}

error.style.display = "block";
}
</script>

</body>
</html>
